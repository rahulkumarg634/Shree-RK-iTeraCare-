        <h3 class="mb-4 text-lg font-bold text-teal-700">Capital Entry History</h3>
        <p class="mb-3 text-sm text-slate-500">Delete karne ke liye 4-digit security PIN maanga jayega.</p>
        ${tableWrap(`
          <thead><tr class="app-table-head bg-teal-50"><th class="px-3 py-2 font-semibold text-teal-700">Date</th><th class="px-3 py-2 font-semibold text-teal-700">Amount</th><th class="px-3 py-2 font-semibold text-teal-700">Notes</th><th class="px-3 py-2 font-semibold text-teal-700">Action</th></tr></thead>
          <tbody class="std-tbody">${capitalRows}</tbody>
        `)}
      </div>
    </div>

    <h3 class="mb-3 mt-8 text-lg font-bold text-teal-700">Month-wise Profit</h3>
    ${tableWrap(`
      <thead><tr class="app-table-head bg-teal-50">
        <th class="px-4 py-3 font-semibold text-teal-700">Month</th><th class="px-4 py-3 font-semibold text-teal-700">Revenue</th>
        <th class="px-4 py-3 font-semibold text-teal-700">Cost of Goods Sold</th><th class="px-4 py-3 font-semibold text-teal-700">Profit</th>
      </tr></thead>
      <tbody class="std-tbody">${monthRows}</tbody>
    `)}`;
}

function attachCapitalEvents() {
  document.getElementById('capitalForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('capitalError');
    const date = document.getElementById('capitalDate').value;
    const amount = Number(document.getElementById('capitalAmount').value);
    const notes = document.getElementById('capitalNotes').value.trim();

    if (isNaN(amount) || amount <= 0) { errEl.textContent = 'Valid amount dalein (zero se zyada).'; errEl.style.display = 'block'; return; }

    const id = DB.meta.nextCapitalId++;
    DB.capitalEntries.push({ id, date, amount, notes, createdAt: new Date().toISOString() });
    saveDB(DB);
    toast('Capital entry saved.');
    route();
  });

  document.querySelectorAll('[data-deletecapital]').forEach(btn => {
    btn.addEventListener('click', () => {
      askForPin(() => {
        if (!confirm('Yeh capital entry delete karein?')) return;
        DB.capitalEntries = DB.capitalEntries.filter(e => String(e.id) !== String(btn.dataset.deletecapital));
        saveDB(DB);
        toast('Capital entry deleted.');
        route();
      }, 'Enter PIN to Delete Capital Entry');
    });
  });
}

/* --------------------------------- Reports --------------------------------------- */

const REPORT_TABS = [
  { key: 'inventory', label: 'Current Inventory' },
  { key: 'stock_ledger', label: 'Stock Ledger (Full History)' },
  { key: 'todays_sales', label: "Today's Sales" },
  { key: 'monthly_sales', label: 'Monthly Sales' },
  { key: 'low_stock', label: 'Low Stock' }
];

let activeReportTab = 'inventory';
let activeReportMonth = new Date().toISOString().slice(0, 7);

function getReportData(type, month) {
  if (type === 'inventory') {
    return DB.medicines.filter(m => m.status === 'Active').map(m => {
      const inv = getInventory(m.id);
      return { Medicine: m.name, Category: m.category, 'Home Stock': inv.homeStock || 0, 'Clinic Stock': inv.clinicStock || 0, 'Total Stock': (inv.homeStock || 0) + (inv.clinicStock || 0), 'Min Alert': m.minStockAlert };
    });
  }
  if (type === 'stock_ledger') {
    // Simple lifetime accounting for every medicine, built entirely from
    // records already kept elsewhere (Stock Entries + current Inventory),
    // plus each medicine's optional "Opening Stock" (for quantity purchased
    // before this app was used, so history isn't lost):
    // Total Sell = Total Purchased minus whatever is Available right now.
    return DB.medicines.map(m => {
      const totalPurchased = (m.openingStock || 0) + DB.stockEntries
        .filter(e => String(e.medicineId) === String(m.id) && !e.cancelled)
        .reduce((s, e) => s + (e.totalQty || 0), 0);
      const inv = getInventory(m.id);
      const homeAvailable = inv.homeStock || 0;
      const clinicAvailable = inv.clinicStock || 0;
      const totalAvailable = homeAvailable + clinicAvailable;
      const totalSell = totalPurchased - totalAvailable;
      return {
        Medicine: m.name,
        'Total Purchased': totalPurchased,
        'Home Available': homeAvailable,
        'Clinic Available': clinicAvailable,
        'Total Available': totalAvailable,
        'Total Sell': totalSell
      };
    });
  }
  if (type === 'todays_sales') {
    const today = todayStr();
    return DB.sales.filter(s => s.date === today).map(s => saleRow(s));
  }
  if (type === 'monthly_sales') {
    return DB.sales.filter(s => s.date.startsWith(month)).map(s => saleRow(s));
  }
  if (type === 'low_stock') {
    return DB.medicines.filter(m => m.status === 'Active' && totalStock(m.id) <= m.minStockAlert)
      .map(m => ({ Medicine: m.name, Category: m.category, 'Total Stock': totalStock(m.id), 'Min Alert': m.minStockAlert }));
  }
  return [];
}

function saleRow(s) {
  return { Date: s.date, Patient: s.patientName, Medicines: saleItemsSummary(s), Qty: saleQtyTotal(s), 'Total Amount': s.totalAmount, Paid: s.paidAmount, Due: s.dueAmount, Payment: s.paymentMode, Type: s.saleType || 'Regular' };
}

function renderReports() {
  const tabs = REPORT_TABS.map(t => `<button data-reporttab="${t.key}" class="rounded-xl px-4 py-2 text-sm font-semibold ${activeReportTab === t.key ? 'bg-teal-500 text-white' : 'bg-white text-teal-700 border border-teal-200'}">${t.label}</button>`).join('');

  const data = getReportData(activeReportTab, activeReportMonth);
  const columns = data.length ? Object.keys(data[0]) : [];

  let rows;
  if (activeReportTab === 'stock_ledger' && data.length) {
    // Total Sell is just Purchased minus Available, so it's always
    // internally consistent — except if it comes out NEGATIVE, which is
    // impossible in real life and means stock was likely added directly
    // via the Inventory page (bypassing Stock Entry), so Total Purchased
    // is understated. Flag those rows so it's easy to spot and fix.
    rows = data.map(row => {
      const suspicious = row['Total Sell'] < 0;
      return `<tr class="${suspicious ? 'bg-red-50' : ''}">${columns.map(c => {
        const isFlagCol = c === 'Total Sell';
        return `<td class="${isFlagCol && suspicious ? 'font-bold text-red-700' : ''}">${row[c]}</td>`;
      }).join('')}</tr>`;
    }).join('');
  } else {
    rows = data.length ? data.map(row => `<tr>${columns.map(c => `<td>${row[c]}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${Math.max(columns.length, 1)}" class="py-8 text-center text-slate-400">No data for this report.</td></tr>`;
  }

  return `
    <h2 class="mb-6 text-2xl font-extrabold text-teal-700">Reports</h2>
    <div class="mb-6 flex flex-wrap gap-2">${tabs}</div>
    ${activeReportTab === 'stock_ledger' ? `<p class="mb-4 text-sm text-slate-500">Har medicine ke liye: April se ab tak kitna Purchase hua (Stock Entry se), abhi Home aur Clinic mein kitna Available hai, aur inka difference hi <strong>Total Sell</strong> hai (Purchased &minus; Available). Agar Total Sell laal rang mein negative dikhe, iska matlab stock kabhi Inventory page se seedha edit hua tha bina Stock Entry ke &mdash; wahan check kar lena.</p>` : ''}
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
      ${activeReportTab === 'monthly_sales' ? `<input id="reportMonth" type="month" class="${INPUT}" style="max-width:180px" value="${activeReportMonth}" />` : '<span></span>'}
      <div class="ml-auto flex gap-2">
        <button id="exportPdfBtn" class="${BTN_SECONDARY}">Export PDF</button>
        <button id="exportExcelBtn" class="${BTN_SECONDARY}">Export Excel</button>
      </div>
    </div>
    ${tableWrap(`
      <thead><tr class="app-table-head bg-teal-50">${columns.map(c => `<th class="px-4 py-3 font-semibold text-teal-700">${c}</th>`).join('')}</tr></thead>
      <tbody class="std-tbody">${rows}</tbody>
    `)}`;
}

function attachReportsEvents() {
  document.querySelectorAll('[data-reporttab]').forEach(btn => {
    btn.addEventListener('click', () => { activeReportTab = btn.dataset.reporttab; route(); });
  });
  const monthInput = document.getElementById('reportMonth');
  if (monthInput) monthInput.addEventListener('change', (e) => { activeReportMonth = e.target.value; route(); });

  document.getElementById('exportPdfBtn').addEventListener('click', exportReportPdf);
  document.getElementById('exportExcelBtn').addEventListener('click', exportReportExcel);
}

function exportReportPdf() {
  const data = getReportData(activeReportTab, activeReportMonth);
  const tabLabel = REPORT_TABS.find(t => t.key === activeReportTab).label;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(14);
  doc.text('Shree RK iTeraHERTZ Care', 105, 15, { align: 'center' });
  doc.setFontSize(11);
  doc.text(tabLabel, 105, 22, { align: 'center' });
  doc.setFontSize(8);
  doc.setTextColor(120);
  doc.text(`Generated on ${new Date().toLocaleString('en-IN')}`, 105, 28, { align: 'center' });

  if (data.length === 0) {
    doc.setTextColor(0);
    doc.text('No data available for this report.', 14, 40);
  } else {
    const columns = Object.keys(data[0]);
    doc.autoTable({
      startY: 34,
      head: [columns],
      body: data.map(row => columns.map(c => String(row[c] ?? ''))),
      styles: { fontSize: 8 },
      headStyles: { fillColor: [15, 118, 110] }
    });
  }
  doc.save(`${activeReportTab}-report.pdf`);
}

function exportReportExcel() {
  const data = getReportData(activeReportTab, activeReportMonth);
  const ws = XLSX.utils.json_to_sheet(data.length ? data : [{ Info: 'No data available for this report.' }]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, REPORT_TABS.find(t => t.key === activeReportTab).label.slice(0, 31));
  XLSX.writeFile(wb, `${activeReportTab}-report.xlsx`);
}

/* --------------------------------- Settings --------------------------------------- */

function renderSettings() {
  return `
    <h2 class="mb-6 text-2xl font-extrabold text-teal-700">Settings</h2>

    <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
      <div class="${CARD}">
        <h3 class="mb-2 text-lg font-bold text-teal-700">Data Backup</h3>
        <p class="mb-4 text-sm text-slate-500">Aapka saara data (medicines, stock, sales) sirf isi browser mein save hota hai. Yeh options data ko safe rakhne mein madad karte hain.</p>

        <div class="mb-4 rounded-xl bg-teal-50 px-4 py-3 text-sm text-teal-800">
          <p id="autoBackupStatus">Automatic backup status check ho raha hai...</p>
        </div>

        <button id="backupBtn" class="${BTN_PRIMARY} w-full mb-2">Download Backup Now (.json)</button>
        <button id="shareBackupBtn" class="${BTN_SECONDARY} w-full mb-2">Share Backup (WhatsApp / Drive / Email)</button>
        <button id="connectBackupBtn" class="${BTN_SECONDARY} w-full mb-3">Connect a File for Daily Auto-Save (Computer)</button>

        <hr class="my-4" />
        <h4 class="mb-2 font-semibold text-slate-700">Restore from Backup</h4>
        <p class="mb-3 text-sm text-slate-500">This will replace all current data with the contents of the backup file.</p>
        <input id="restoreFile" type="file" accept="application/json" class="${INPUT}" />
        <p id="restoreError" class="mt-2 text-sm font-medium text-red-600" style="display:none"></p>
      </div>

      <div class="${CARD}">
        <h3 class="mb-2 text-lg font-bold text-teal-700">Change Password</h3>
        <form id="passwordForm" class="space-y-4">
          <div><label class="${LABEL}">Current Password</label><input id="currentPassword" type="password" class="${INPUT}" required /></div>
          <div><label class="${LABEL}">New Password</label><input id="newPassword" type="password" class="${INPUT}" required /></div>
          <p id="passwordError" class="text-sm font-medium text-red-600" style="display:none"></p>
          <p id="passwordSuccess" class="text-sm font-medium text-emerald-600" style="display:none"></p>
          <button type="submit" class="${BTN_PRIMARY} w-full">Update Password</button>
        </form>
      </div>

      <div class="${CARD}">
        <h3 class="mb-2 text-lg font-bold text-teal-700">Security PIN</h3>
        <p class="mb-4 text-sm text-slate-500">Yeh 4-digit PIN medicine edit/delete aur inventory edit jaise sensitive actions ko protect karta hai.</p>
        <form id="pinForm" class="space-y-4">
          <div><label class="${LABEL}">Current PIN</label><input id="currentPin" type="password" maxlength="4" inputmode="numeric" class="${INPUT}" required /></div>
          <div><label class="${LABEL}">New 4-digit PIN</label><input id="newPin" type="password" maxlength="4" inputmode="numeric" class="${INPUT}" required /></div>
          <p id="pinFormError" class="text-sm font-medium text-red-600" style="display:none"></p>
          <p id="pinFormSuccess" class="text-sm font-medium text-emerald-600" style="display:none"></p>
          <button type="submit" class="${BTN_PRIMARY} w-full">Update PIN</button>
        </form>
      </div>
    </div>`;
}

function attachSettingsEvents() {
  document.getElementById('backupBtn').addEventListener('click', () => {
    downloadBackupFile();
    localStorage.setItem(LAST_AUTOBACKUP_KEY, todayStr());
    toast('Backup downloaded.');
    updateAutoBackupStatusDisplay();
  });

  document.getElementById('shareBackupBtn').addEventListener('click', shareBackupFile);

  document.getElementById('connectBackupBtn').addEventListener('click', async () => {
    await connectBackupFile();
    updateAutoBackupStatusDisplay();
  });

  updateAutoBackupStatusDisplay();

  async function updateAutoBackupStatusDisplay() {
    const statusEl = document.getElementById('autoBackupStatus');
    if (!statusEl) return;
    const handle = await loadBackupFileHandle();
    const last = localStorage.getItem(LAST_AUTOBACKUP_KEY);
    const lastText = last ? `Last backup: ${last}` : 'Abhi tak koi automatic backup nahi hua.';
    if (handle) {
      statusEl.innerHTML = `&#9989; Auto-save ON &mdash; "<strong>${escapeHtml(handle.name)}</strong>" file har din khud update hoti hai. ${lastText}`;
    } else {
      statusEl.innerHTML = `&#8505;&#65039; Har din app khulte hi backup Downloads folder mein khud download ho jati hai (bina click kiye). ${lastText}`;
    }
  }

  document.getElementById('restoreFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const errEl = document.getElementById('restoreError');
    errEl.style.display = 'none';
    if (!confirm('This will replace ALL current data with the backup file. Continue?')) { e.target.value = ''; return; }

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.medicines || !parsed.inventory || !parsed.sales || !parsed.admin) {
          throw new Error('This does not look like a valid backup file.');
        }
        DB = migrateDB(parsed);
        saveDB(DB);
        toast('Backup restored successfully.');
        route();
      } catch (err) {
        errEl.textContent = 'Could not restore: ' + err.message;
        errEl.style.display = 'block';
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('passwordForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('passwordError');
    const successEl = document.getElementById('passwordSuccess');
    errEl.style.display = 'none';
    successEl.style.display = 'none';

    const current = document.getElementById('currentPassword').value;
    const next = document.getElementById('newPassword').value;

    if (current !== DB.admin.password) { errEl.textContent = 'Current password is incorrect.'; errEl.style.display = 'block'; return; }
    if (next.length < 4) { errEl.textContent = 'New password must be at least 4 characters.'; errEl.style.display = 'block'; return; }

    DB.admin.password = next;
    saveDB(DB);
    successEl.textContent = 'Password updated successfully.';
    successEl.style.display = 'block';
    document.getElementById('passwordForm').reset();
  });

  document.getElementById('pinForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const errEl = document.getElementById('pinFormError');
    const successEl = document.getElementById('pinFormSuccess');
    errEl.style.display = 'none';
    successEl.style.display = 'none';

    const current = document.getElementById('currentPin').value;
    const next = document.getElementById('newPin').value;

    if (current !== DB.admin.securityPin) { errEl.textContent = 'Current PIN is incorrect.'; errEl.style.display = 'block'; return; }
    if (!/^\d{4}$/.test(next)) { errEl.textContent = 'New PIN exactly 4 digits ka hona chahiye.'; errEl.style.display = 'block'; return; }

    DB.admin.securityPin = next;
    saveDB(DB);
    successEl.textContent = 'Security PIN updated successfully.';
    successEl.style.display = 'block';
    document.getElementById('pinForm').reset();
  });
}

</script>
